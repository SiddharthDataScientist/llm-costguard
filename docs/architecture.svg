<svg width="680" height="570" viewBox="0 0 680 570" xmlns="http://www.w3.org/2000/svg" font-family="Arial, Helvetica, sans-serif">
<title>LLM-CostGuard architecture</title>
<desc>Flowchart showing a client request passing through a FastAPI gateway that checks a semantic cache, then either returns a cached response or routes to a cost-tier model via OpenAI, with all activity logged to Firestore and surfaced on a Streamlit dashboard.</desc>
<defs>
  <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
    <path d="M2 1L8 5L2 9" fill="none" stroke="#555" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
  </marker>
</defs>

<rect width="680" height="570" fill="#ffffff"/>

<!-- Client request -->
<rect x="250" y="20" width="180" height="44" rx="8" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1"/>
<text x="340" y="47" text-anchor="middle" font-size="15" fill="#212529">Client request</text>
<line x1="340" y1="64" x2="340" y2="100" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Gateway -->
<rect x="190" y="100" width="300" height="56" rx="8" fill="#d0ebff" stroke="#4dabf7" stroke-width="1"/>
<text x="340" y="123" text-anchor="middle" font-size="15" font-weight="bold" fill="#1864ab">Gateway (FastAPI)</text>
<text x="340" y="143" text-anchor="middle" font-size="12" fill="#1864ab">Embeds prompt, checks cache</text>

<path d="M340 156L340 175L215 175L215 190" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M340 156L340 175L465 175L465 190" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Cache hit -->
<rect x="110" y="190" width="210" height="56" rx="8" fill="#c3fae8" stroke="#38d9a9" stroke-width="1"/>
<text x="215" y="213" text-anchor="middle" font-size="15" font-weight="bold" fill="#087f5b">Cache hit</text>
<text x="215" y="233" text-anchor="middle" font-size="12" fill="#087f5b">Return cached response</text>

<!-- Cache miss / router -->
<rect x="360" y="190" width="210" height="56" rx="8" fill="#d0ebff" stroke="#4dabf7" stroke-width="1"/>
<text x="465" y="213" text-anchor="middle" font-size="15" font-weight="bold" fill="#1864ab">Cache miss</text>
<text x="465" y="233" text-anchor="middle" font-size="12" fill="#1864ab">Route to cost-tier model</text>

<line x1="465" y1="246" x2="465" y2="290" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- OpenAI call -->
<rect x="360" y="290" width="210" height="56" rx="8" fill="#d0ebff" stroke="#4dabf7" stroke-width="1"/>
<text x="465" y="313" text-anchor="middle" font-size="15" font-weight="bold" fill="#1864ab">OpenAI model call</text>
<text x="465" y="333" text-anchor="middle" font-size="12" fill="#1864ab">gpt-4o-mini or gpt-4o</text>

<path d="M215 246L215 365L270 365L270 380" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>
<path d="M465 346L465 365L410 365L410 380" fill="none" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Firestore -->
<rect x="190" y="380" width="300" height="56" rx="8" fill="#ffe8cc" stroke="#ffa94d" stroke-width="1"/>
<text x="340" y="403" text-anchor="middle" font-size="15" font-weight="bold" fill="#e8590c">Firestore</text>
<text x="340" y="423" text-anchor="middle" font-size="12" fill="#e8590c">Logs cost, latency, cache hits</text>

<line x1="340" y1="436" x2="340" y2="470" stroke="#555" stroke-width="1.5" marker-end="url(#arrow)"/>

<!-- Dashboard -->
<rect x="190" y="470" width="300" height="56" rx="8" fill="#f1f3f5" stroke="#adb5bd" stroke-width="1"/>
<text x="340" y="493" text-anchor="middle" font-size="15" font-weight="bold" fill="#212529">Streamlit dashboard</text>
<text x="340" y="513" text-anchor="middle" font-size="12" fill="#212529">Cost, cache-hit rate, latency</text>
</svg>
